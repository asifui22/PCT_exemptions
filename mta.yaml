_schema-version: 3.3.0
ID: PCtExemptions
description: A simple CAP project.
version: 1.0.0
modules:
  - name: PCtExemptions-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: PCtExemptions-auth
      - name: PCtExemptions-db
      - name: PCtExemptions-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: PCtExemptions-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: PCtExemptions-db
    parameters:
      buildpack: nodejs_buildpack
  - name: PCtExemptions-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: PCtExemptions-auth
      - name: srv-api
      - name: PCtExemptions-html5-repo-host
        parameters:
          config:
            HTML5Runtime_enabled: true
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - artifacts:
            - pctexemptionapp.zip
          name: PCtExemptionspctexemptionapp
          target-path: app/
  - name: PCtExemptionspctexemptionapp
    type: html5
    path: app/pctexemptionapp
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
  - name: PCtExemptions-destinations
    type: com.sap.application.content
    requires:
      - name: PCtExemptions-auth
        parameters:
          service-key:
            name: PCtExemptions-auth-key
      - name: PCtExemptions-html5-repo-host
        parameters:
          service-key:
            name: PCtExemptions-html5-repo-host-key
      - name: srv-api
      - name: PCtExemptions-destination
        parameters:
          content-target: true
    parameters:
      content:
        instance:
          destinations:
            - Name: PCtExemptions-html5-repository
              ServiceInstanceName: PCtExemptions-html5-repo-host
              ServiceKeyName: PCtExemptions-html5-repo-host-key
              sap.cloud.service: PCtExemptions.service
            - Authentication: OAuth2UserTokenExchange
              Name: PCtExemptions-auth
              ServiceInstanceName: PCtExemptions-auth
              ServiceKeyName: PCtExemptions-auth-key
              sap.cloud.service: PCtExemptions.service
          existing_destinations_policy: update
    build-parameters:
      no-source: true
resources:
  - name: PCtExemptions-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        tenant-mode: dedicated
        xsappname: PCtExemptions-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
  - name: PCtExemptions-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: PCtExemptions-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
      service: destination
      service-plan: lite
    requires:
      - name: srv-api
  - name: PCtExemptions-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
